apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-services.ollama.fullname" . }}
  namespace: {{ include "ai-services.namespace" . }}
  labels:
    {{- include "ai-services.labels" . | nindent 4 }}
    {{- include "ai-services.ollama.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.ollama.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "ai-services.ollama.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-services.labels" . | nindent 8 }}
        {{- include "ai-services.ollama.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.ollama.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ollama.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.ollama.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: ollama
          image: "{{ .Values.ollama.image.repository }}:{{ .Values.ollama.image.tag }}"
          imagePullPolicy: {{ .Values.ollama.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 11434
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ai-services.ollama.fullname" . }}
          {{- if .Values.ollama.persistence.enabled }}
          volumeMounts:
            - name: ollama-data
              mountPath: /root/.ollama
          {{- end }}
          livenessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: {{ .Values.ollama.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.ollama.healthCheck.periodSeconds }}
            timeoutSeconds: {{ .Values.ollama.healthCheck.timeoutSeconds }}
            failureThreshold: {{ .Values.ollama.healthCheck.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /api/tags
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.ollama.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.ollama.persistence.enabled }}
      volumes:
        - name: ollama-data
          persistentVolumeClaim:
            claimName: {{ include "ai-services.ollama.fullname" . }}
      {{- end }}
