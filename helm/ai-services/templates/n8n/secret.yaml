{{- if and .Values.n8n.auth.enabled (not .Values.n8n.auth.existingSecret) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "ai-services.n8n.fullname" . }}
  namespace: {{ include "ai-services.namespace" . }}
  labels:
    {{- include "ai-services.labels" . | nindent 4 }}
    {{- include "ai-services.n8n.selectorLabels" . | nindent 4 }}
type: Opaque
data:
  n8n-password: {{ .Values.n8n.auth.password | b64enc | quote }}
{{- end }}
