apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ai-services.n8n.fullname" . }}
  namespace: {{ include "ai-services.namespace" . }}
  labels:
    {{- include "ai-services.labels" . | nindent 4 }}
    {{- include "ai-services.n8n.selectorLabels" . | nindent 4 }}
spec:
  replicas: {{ .Values.n8n.replicaCount }}
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "ai-services.n8n.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ai-services.labels" . | nindent 8 }}
        {{- include "ai-services.n8n.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.n8n.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.n8n.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.n8n.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        fsGroup: 1000
      {{- if .Values.n8n.persistence.enabled }}
      initContainers:
        - name: fix-permissions
          image: busybox:1.36
          command: ["sh", "-c", "chown -R 1000:1000 /home/node/.n8n"]
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
          securityContext:
            runAsUser: 0
      {{- end }}
      containers:
        - name: n8n
          image: "{{ .Values.n8n.image.repository }}:{{ .Values.n8n.image.tag }}"
          imagePullPolicy: {{ .Values.n8n.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 5678
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ai-services.n8n.fullname" . }}
          {{- if .Values.n8n.auth.enabled }}
          env:
            - name: N8N_BASIC_AUTH_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "ai-services.n8n.secretName" . }}
                  key: {{ .Values.n8n.auth.existingSecretPasswordKey }}
          {{- end }}
          {{- if .Values.n8n.persistence.enabled }}
          volumeMounts:
            - name: n8n-data
              mountPath: /home/node/.n8n
          {{- end }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: {{ .Values.n8n.healthCheck.initialDelaySeconds }}
            periodSeconds: {{ .Values.n8n.healthCheck.periodSeconds }}
            timeoutSeconds: {{ .Values.n8n.healthCheck.timeoutSeconds }}
            failureThreshold: {{ .Values.n8n.healthCheck.failureThreshold }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          {{- with .Values.n8n.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- if .Values.n8n.persistence.enabled }}
      volumes:
        - name: n8n-data
          persistentVolumeClaim:
            claimName: {{ include "ai-services.n8n.fullname" . }}
      {{- end }}
