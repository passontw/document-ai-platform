{{- if .Values.n8n.persistence.enabled }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "ai-services.n8n.fullname" . }}
  namespace: {{ include "ai-services.namespace" . }}
  labels:
    {{- include "ai-services.labels" . | nindent 4 }}
    {{- include "ai-services.n8n.selectorLabels" . | nindent 4 }}
spec:
  accessModes:
    - {{ .Values.n8n.persistence.accessMode }}
  storageClassName: {{ .Values.n8n.persistence.storageClass | quote }}
  resources:
    requests:
      storage: {{ .Values.n8n.persistence.size }}
{{- end }}
