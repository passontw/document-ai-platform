{{- if .Values.n8n.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ai-services.n8n.fullname" . }}
  namespace: {{ include "ai-services.namespace" . }}
  labels:
    {{- include "ai-services.labels" . | nindent 4 }}
    {{- include "ai-services.n8n.selectorLabels" . | nindent 4 }}
  {{- with .Values.n8n.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.n8n.ingress.className }}
  {{- if .Values.n8n.ingress.tls }}
  tls:
    {{- toYaml .Values.n8n.ingress.tls | nindent 4 }}
  {{- end }}
  rules:
    {{- range .Values.n8n.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: {{ .pathType }}
            backend:
              service:
                name: {{ include "ai-services.n8n.fullname" $ }}
                port:
                  number: {{ $.Values.n8n.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
