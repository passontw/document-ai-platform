networks:
  backend:
    name: platform-backend
    external: true

volumes:
  minio_data:

services:
  minio:
    image: minio/minio
    networks:
      - backend
    volumes:
      - minio_data:/data
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped


  appflowy_cloud:
    image: appflowyinc/appflowy_cloud:latest
    networks:
      - backend
    ports:
      - "8000:8000"
    environment:
      APPFLOWY_ENVIRONMENT: production
      APPFLOWY_DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@platform-postgres/postgres
      APPFLOWY_REDIS_URI: redis://platform-valkey:6379/1
      APPFLOWY_GOTRUE_JWT_SECRET: ${APPFLOWY_JWT_SECRET}
      APPFLOWY_GOTRUE_BASE_URL: http://gotrue:9999
      APPFLOWY_WEB_URL: http://${MAC_MINI_IP}:6600
      APPFLOWY_S3_USE_MINIO: "true"
      APPFLOWY_S3_MINIO_URL: http://minio:9000
      APPFLOWY_S3_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      APPFLOWY_S3_SECRET_KEY: ${MINIO_SECRET_KEY}
      APPFLOWY_S3_BUCKET: appflowy
      APPFLOWY_S3_CREATE_BUCKET: "true"
      APPFLOWY_S3_PRESIGNED_URL_ENDPOINT: http://${MAC_MINI_IP}:6600/minio-api
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:8000/api/health"]
      interval: 5s
      timeout: 5s
      retries: 12
    depends_on:
      gotrue:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped

  gotrue:
    image: appflowyinc/gotrue:latest
    networks:
      - backend
    environment:
      API_EXTERNAL_URL: http://${MAC_MINI_IP}:6600/gotrue
      GOTRUE_SITE_URL: appflowy-flutter://
      GOTRUE_URI_ALLOW_LIST: "**"
      GOTRUE_JWT_SECRET: ${APPFLOWY_JWT_SECRET}
      GOTRUE_JWT_ADMIN_GROUP_NAME: supabase_admin
      GOTRUE_DB_DRIVER: postgres
      DATABASE_URL: postgres://postgres:${POSTGRES_PASSWORD}@platform-postgres/postgres?search_path=auth
      PORT: "9999"
      GOTRUE_DISABLE_SIGNUP: "false"
      GOTRUE_MAILER_AUTOCONFIRM: "true"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://127.0.0.1:9999/health"]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 40s
    restart: unless-stopped

  appflowy_web:
    image: appflowyinc/appflowy_web:latest
    networks:
      - backend
    environment:
      APPFLOWY_BASE_URL: http://${MAC_MINI_IP}:6600
      APPFLOWY_GOTRUE_BASE_URL: http://${MAC_MINI_IP}:6600/gotrue
      APPFLOWY_WS_BASE_URL: ws://${MAC_MINI_IP}:6600/ws/v2
    depends_on:
      appflowy_cloud:
        condition: service_healthy
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    networks:
      - backend
    ports:
      - "6600:6600"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - appflowy_cloud
      - appflowy_web
      - gotrue
    restart: unless-stopped
