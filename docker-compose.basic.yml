networks:
  backend:
    name: platform-backend
    driver: bridge

volumes:
  postgres_data:
  valkey_data:

services:
  postgres:
    image: postgres:15
    container_name: platform-postgres
    networks:
      - backend
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: postgres
      PENPOT_DB_PASSWORD: ${PENPOT_DB_PASSWORD}
      APPFLOWY_DB_PASSWORD: ${APPFLOWY_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  valkey:
    image: valkey/valkey:8.1
    container_name: platform-valkey
    networks:
      - backend
    volumes:
      - valkey_data:/data
    command: valkey-server --maxmemory 256mb --maxmemory-policy volatile-lfu
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
