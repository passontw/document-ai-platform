x-penpot-common-env: &penpot-common-env
  PENPOT_FLAGS: disable-email-verification disable-secure-session-cookies enable-registration disable-telemetry
  PENPOT_PUBLIC_URI: http://${MAC_MINI_IP}:9001
  PENPOT_HTTP_SERVER_MAX_BODY_SIZE: 31457280
  PENPOT_HTTP_SERVER_MAX_MULTIPART_BODY_SIZE: 367001600
  PENPOT_SECRET_KEY: ${PENPOT_SECRET_KEY}

networks:
  penpot:
    driver: bridge

volumes:
  penpot_postgres_v15:
  penpot_assets:

services:
  penpot-frontend:
    image: penpotapp/frontend:latest
    networks:
      - penpot
    ports:
      - "9001:8080"
    volumes:
      - penpot_assets:/opt/data/assets
    environment:
      <<: *penpot-common-env
    depends_on:
      - penpot-backend
    restart: unless-stopped

  penpot-backend:
    image: penpotapp/backend:latest
    networks:
      - penpot
    volumes:
      - penpot_assets:/opt/data/assets
    environment:
      <<: *penpot-common-env
      PENPOT_DATABASE_URI: postgresql://penpot-postgres/penpot
      PENPOT_DATABASE_USERNAME: penpot
      PENPOT_DATABASE_PASSWORD: ${PENPOT_DB_PASSWORD}
      PENPOT_REDIS_URI: redis://penpot-valkey/0
      PENPOT_ASSETS_STORAGE_BACKEND: assets-fs
      PENPOT_STORAGE_ASSETS_FS_DIRECTORY: /opt/data/assets
      PENPOT_TELEMETRY_ENABLED: "false"
    depends_on:
      penpot-postgres:
        condition: service_healthy
      penpot-valkey:
        condition: service_healthy
    restart: unless-stopped

  penpot-exporter:
    image: penpotapp/exporter:latest
    networks:
      - penpot
    environment:
      PENPOT_PUBLIC_URI: http://penpot-frontend:8080
    depends_on:
      - penpot-frontend
    restart: unless-stopped

  penpot-postgres:
    image: postgres:15
    networks:
      - penpot
    volumes:
      - penpot_postgres_v15:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: penpot
      POSTGRES_USER: penpot
      POSTGRES_PASSWORD: ${PENPOT_DB_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U penpot"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  penpot-valkey:
    image: valkey/valkey:8.1
    networks:
      - penpot
    command: valkey-server --maxmemory 128mb --maxmemory-policy volatile-lfu
    healthcheck:
      test: ["CMD", "valkey-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
