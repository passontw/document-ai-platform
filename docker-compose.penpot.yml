x-penpot-common-env: &penpot-common-env
  PENPOT_FLAGS: disable-email-verification disable-secure-session-cookies enable-registration disable-telemetry
  PENPOT_PUBLIC_URI: http://${MAC_MINI_IP}:9001
  PENPOT_HTTP_SERVER_MAX_BODY_SIZE: 31457280
  PENPOT_HTTP_SERVER_MAX_MULTIPART_BODY_SIZE: 367001600
  PENPOT_SECRET_KEY: ${PENPOT_SECRET_KEY}

networks:
  backend:
    name: platform-backend
    external: true

volumes:
  penpot_assets:

services:
  penpot-frontend:
    image: penpotapp/frontend:latest
    networks:
      - backend
    ports:
      - "9001:8080"
    volumes:
      - penpot_assets:/opt/data/assets
    environment:
      <<: *penpot-common-env
    depends_on:
      - penpot-backend
    restart: unless-stopped

  penpot-backend:
    image: penpotapp/backend:latest
    networks:
      - backend
    volumes:
      - penpot_assets:/opt/data/assets
    environment:
      <<: *penpot-common-env
      PENPOT_DATABASE_URI: postgresql://platform-postgres/penpot
      PENPOT_DATABASE_USERNAME: penpot
      PENPOT_DATABASE_PASSWORD: ${PENPOT_DB_PASSWORD}
      PENPOT_REDIS_URI: redis://platform-valkey/0
      PENPOT_ASSETS_STORAGE_BACKEND: assets-fs
      PENPOT_STORAGE_ASSETS_FS_DIRECTORY: /opt/data/assets
      PENPOT_TELEMETRY_ENABLED: "false"
    restart: unless-stopped

  penpot-exporter:
    image: penpotapp/exporter:latest
    networks:
      - backend
    environment:
      <<: *penpot-common-env
      PENPOT_PUBLIC_URI: http://penpot-frontend:8080
      PENPOT_REDIS_URI: redis://platform-valkey/0
    depends_on:
      - penpot-frontend
    restart: unless-stopped
