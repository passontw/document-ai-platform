events {
    worker_connections 1024;
}

http {
    resolver 127.0.0.11 valid=30s ipv6=off;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 6600;
        client_max_body_size 10M;
        underscores_in_headers on;

        set $appflowy_cloud  http://appflowy_cloud:8000;
        set $gotrue          http://gotrue:9999;
        set $appflowy_web    http://appflowy_web:80;
        set $minio_console   http://minio:9001;
        set $minio_api       http://minio:9000;

        location /gotrue/ {
            proxy_pass $gotrue;
            rewrite ^/gotrue(/.*)$ $1 break;
            proxy_set_header Host $http_host;
            proxy_pass_request_headers on;
        }

        location /ws {
            proxy_pass $appflowy_cloud;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "Upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_read_timeout 86400s;
        }

        location /api {
            proxy_pass $appflowy_cloud;
            proxy_set_header X-Request-Id $request_id;
            proxy_set_header Host $http_host;

            location /api/chat {
                proxy_pass $appflowy_cloud;
                proxy_http_version 1.1;
                proxy_set_header Connection "";
                chunked_transfer_encoding on;
                proxy_buffering off;
                proxy_cache off;
                proxy_read_timeout 600s;
            }

            location /api/import {
                proxy_pass $appflowy_cloud;
                proxy_set_header X-Request-Id $request_id;
                proxy_set_header Host $http_host;
                proxy_read_timeout 600s;
                proxy_request_buffering off;
                proxy_buffering off;
                client_max_body_size 2G;
            }
        }

        location /minio/ {
            proxy_pass $minio_console;
            rewrite ^/minio/(.*) /$1 break;
            proxy_set_header Host $http_host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            chunked_transfer_encoding off;
        }

        location /minio-api/ {
            proxy_pass $minio_api;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            rewrite ^/minio-api/(.*) /$1 break;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            chunked_transfer_encoding off;
            client_max_body_size 1000M;
        }

        location / {
            proxy_pass $appflowy_web;
            proxy_set_header Host $host;
            proxy_set_header X-Scheme $scheme;
        }
    }
}
